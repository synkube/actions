# Reusable Docker build + semver tag + GHCR push (main) or build-only (PR).
#
# Scope: ONE image per workflow_call. Callers with multiple images use a job matrix;
# each matrix row invokes this workflow separately (parallel sub-jobs).
#
# Caller pattern:
#   strategy.matrix.include:
#     - id: api
#       image_name: api
#       dockerfile: Dockerfile
#       context: .
#       tag_prefix: api/v
#     - id: worker
#       image_name: worker
#       dockerfile: docker/worker/Dockerfile
#       context: docker/worker
#       tag_prefix: worker/v
#   uses: synkube/actions/.github/workflows/docker-build-push.yaml@<sha>
#   with:
#     image_name: ${{ matrix.image_name }}
#     dockerfile: ${{ matrix.dockerfile }}
#     context: ${{ matrix.context }}
#     tag_prefix: ${{ matrix.tag_prefix }}
#
# Pair each image with its own deploy.yaml call (tag_prefix + managed_key).
name: Docker build and push

on:
  workflow_call:
    inputs:
      image_name:
        description: >-
          Image path segment under ghcr.io/<owner>/<repo>/ (e.g. service, opa).
        required: true
        type: string
      dockerfile:
        description: Dockerfile path relative to repository root
        required: true
        type: string
      context:
        description: Docker build context path relative to repository root
        required: false
        type: string
        default: "."
      tag_prefix:
        description: Git tag prefix for semver bumps (e.g. service/v → service/v0.0.1)
        required: true
        type: string
      registry:
        description: Container registry host
        required: false
        type: string
        default: ghcr.io
      push_ref:
        description: >-
          Ref that triggers push + semver tag (default main). Other refs build only.
        required: false
        type: string
        default: refs/heads/main
      trivy_scan:
        description: Run Trivy image scan after push (push_ref only)
        required: false
        type: boolean
        default: true
    outputs:
      image_repo:
        description: ghcr.io/owner/repo/image_name (no tag)
        value: ${{ jobs.build.outputs.image_repo }}
      version:
        description: Semver written to registry and git tag (empty when not pushed)
        value: ${{ jobs.build.outputs.version }}
      sha_tag:
        description: Short SHA tag used for PR builds and Trivy
        value: ${{ jobs.build.outputs.sha_tag }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}
      version: ${{ steps.version.outputs.new_version || '' }}
      sha_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Registry metadata
        id: meta
        env:
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          set -euo pipefail
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          sha_short="$(echo "${{ github.sha }}" | cut -c1-7)"
          {
            echo "owner=${owner}"
            echo "repo=${repo}"
            echo "sha=${sha_short}"
            echo "image_repo=${REGISTRY}/${owner}/${repo}/${IMAGE_NAME}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to registry
        if: github.ref == inputs.push_ref
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next version
        if: github.ref == inputs.push_ref
        id: version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: ${{ inputs.tag_prefix }}
          release_branches: main
          fetch_all_tags: true
          default_bump: patch
          custom_release_rules: "feat:patch,fix:patch,minor:minor,major:major"
          dry_run: true

      - name: Build (non-push ref)
        if: github.ref != inputs.push_ref
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push
        if: github.ref == inputs.push_ref
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}:latest
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.image_repo }}:${{ steps.version.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        if: github.ref == inputs.push_ref && inputs.trivy_scan && vars.CI_G_TRIVY_IMAGE_ENABLED != 'false'
        uses: synkube/actions/.github/actions/trivy-image@9f425ac79ec75ce388b4e27528784a095a272584
        with:
          image-ref: ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.sha }}
          project-name: ${{ inputs.image_name }}
          formats: table

      - name: Push version tag
        if: github.ref == inputs.push_ref
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: ${{ inputs.tag_prefix }}
          release_branches: main
          fetch_all_tags: true
          default_bump: patch
          custom_release_rules: "feat:patch,fix:patch,minor:minor,major:major"
