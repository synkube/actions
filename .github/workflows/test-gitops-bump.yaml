name: Test gitops-bump action

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/actions/gitops-bump/**"
      - ".github/workflows/test-gitops-bump.yaml"
  push:
    paths:
      - ".github/actions/gitops-bump/**"
      - ".github/workflows/test-gitops-bump.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Lint gitops-bump scripts
        run: |
          bash -n .github/actions/gitops-bump/update-managed-values.sh
          bash -n .github/actions/gitops-bump/submit-gitops-change.sh
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck .github/actions/gitops-bump/update-managed-values.sh
          shellcheck .github/actions/gitops-bump/submit-gitops-change.sh

      - name: PR branch name helper
        run: |
          branch="$(./.github/actions/gitops-bump/submit-gitops-change.sh --print-pr-branch gitops/bump service.tag 0.0.9)"
          [[ "${branch}" == "gitops/bump/service-tag/0.0.9" ]]
          family="$(./.github/actions/gitops-bump/submit-gitops-change.sh --print-pr-family gitops/bump service.tag)"
          [[ "${family}" == "gitops/bump/service-tag" ]]

      - name: Superseded PR selection (jq filter)
        run: |
          json='[
            {"number":10,"headRefName":"gitops/bump/service-tag/0.0.8"},
            {"number":11,"headRefName":"gitops/bump/service-tag/0.0.9"},
            {"number":12,"headRefName":"gitops/bump/opa-image/0.0.8"}
          ]'
          stale="$(printf '%s' "${json}" | jq -r --arg family "gitops/bump/service-tag/" --arg keep "gitops/bump/service-tag/0.0.9" \
            '.[] | select(.headRefName | startswith($family)) | select(.headRefName != $keep) | .number | tostring')"
          [[ "${stale}" == "10" ]]

      - name: Prepare fixture values file
        run: |
          cat > /tmp/jwt-exchange-values.yaml <<'YAML'
          image:
            repository: ghcr.io/synkube/jwt-exchange/service
            tag: "0.0.1" # github-workflow-managed:service.tag
          extraContainers:
            - name: opa
              image: ghcr.io/synkube/jwt-exchange/opa:0.0.1 # github-workflow-managed:opa.image
          YAML

      - name: Bump service.tag
        run: |
          ./.github/actions/gitops-bump/update-managed-values.sh \
            /tmp/jwt-exchange-values.yaml service.tag 0.0.9
          grep -F 'tag: "0.0.9" # github-workflow-managed:service.tag' /tmp/jwt-exchange-values.yaml

      - name: Bump opa.image
        run: |
          ./.github/actions/gitops-bump/update-managed-values.sh \
            /tmp/jwt-exchange-values.yaml opa.image 0.0.8
          grep -F 'image: ghcr.io/synkube/jwt-exchange/opa:0.0.8 # github-workflow-managed:opa.image' /tmp/jwt-exchange-values.yaml

      - name: Rejects unknown managed key
        run: |
          set +e
          ./.github/actions/gitops-bump/update-managed-values.sh \
            /tmp/jwt-exchange-values.yaml missing.key 1.0.0
          [[ $? -ne 0 ]]

      - name: Push retry handles concurrent GitOps updates
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          submit="${GITHUB_WORKSPACE}/.github/actions/gitops-bump/submit-gitops-change.sh"
          update="${GITHUB_WORKSPACE}/.github/actions/gitops-bump/update-managed-values.sh"

          cat > "${work}/values.yaml" <<'YAML'
          tag: "0.0.1" # github-workflow-managed:service.tag
          image: ghcr.io/synkube/jwt-exchange/opa:0.0.1 # github-workflow-managed:opa.image
          YAML

          git init -b main "${work}/origin"
          cp "${work}/values.yaml" "${work}/origin/values.yaml"
          git -C "${work}/origin" -c user.email=test@test -c user.name=test add values.yaml
          git -C "${work}/origin" -c user.email=test@test -c user.name=test commit -m "init"
          git init --bare "${work}/remote.git"
          git -C "${work}/origin" remote add origin "${work}/remote.git"
          git -C "${work}/origin" push -u origin main
          git -C "${work}/remote.git" symbolic-ref HEAD refs/heads/main

          git clone -b main "${work}/remote.git" "${work}/job-a"
          git clone -b main "${work}/remote.git" "${work}/job-b"

          "${update}" "${work}/job-a/values.yaml" service.tag 0.0.2
          git -C "${work}/job-a" -c user.email=test@test -c user.name=test add values.yaml
          git -C "${work}/job-a" -c user.email=test@test -c user.name=test commit -m "bump service"
          git -C "${work}/job-a" push origin main

          "${update}" "${work}/job-b/values.yaml" opa.image 0.0.2
          out="${work}/job-b.out"
          (
            cd "${work}/job-b"
            export DELIVERY=push VALUES_PATH=values.yaml MANAGED_KEY=opa.image VERSION=0.0.2
            export BRANCH=main COMMIT_MESSAGE="bump opa" GITHUB_OUTPUT="${out}"
            export GIT_USER_NAME=test GIT_USER_EMAIL=test@test PUSH_RETRY_MAX=5
            "${submit}"
          )

          grep -q 'changed=true' "${out}"
          git clone -b main "${work}/remote.git" "${work}/verify"
          grep -F 'tag: "0.0.2" # github-workflow-managed:service.tag' "${work}/verify/values.yaml"
          grep -F 'image: ghcr.io/synkube/jwt-exchange/opa:0.0.2 # github-workflow-managed:opa.image' "${work}/verify/values.yaml"
