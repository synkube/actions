# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/.github/actions/kics-github-action"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/.github/actions/kics-github-action"
    schedule:
      interval: "weekly"
